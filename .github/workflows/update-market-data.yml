name: Update market data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * 1-5"

permissions:
  contents: write

jobs:
  update-market-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Fetch Yahoo Finance data
        run: |
          if [ -f scripts/update_data.py ]; then
            python scripts/update_data.py --output data/omxs30-data.json
          else
            python update_data.py --output data/omxs30-data.json
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/omxs30-data.json
          if git diff --cached --quiet; then
            echo "No market data changes to commit"
          else
            git commit -m "Update market data"
            git push
          fi
