name: Update prices

on:
  workflow_dispatch:
  schedule:
    # GitHub uses UTC. These paired schedules cover the same 20 Stockholm
    # trading-day slots during summer and winter time. The Python script
    # filters to the real local slots.
    - cron: "1,25,49 7,9,11,13 * * 1-5"
    - cron: "13,37 8,10,12,14 * * 1-5"
    - cron: "1,25,49 8,10,12,14 * * 1-5"
    - cron: "13,37 9,11,13,15 * * 1-5"

permissions:
  contents: write

concurrency:
  group: omxs30-data-writes
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Fetch Yahoo Finance prices
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python scripts/update_prices.py --output data/prices.json --enforce-price-slots
          else
            python scripts/update_prices.py --output data/prices.json
          fi

      - name: Commit updated prices
        run: |
          if [ ! -f data/prices.json ]; then
            echo "No price file written"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.json

          if git diff --cached --quiet; then
            echo "No price changes to commit"
            exit 0
          fi

          git commit -m "Update prices"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push; then
              exit 0
            fi
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done

          echo "Could not push updated prices after 3 attempts"
          exit 1
