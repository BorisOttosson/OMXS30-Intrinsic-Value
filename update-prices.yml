name: Update prices

on:
  workflow_dispatch:
  schedule:
    # Every 5 minutes on weekdays across the possible UTC hours for 09:01-17:01 Europe/Stockholm.
    # The Python updater checks Europe/Stockholm time, so daylight saving time is handled there.
    - cron: "1-56/5 7-16 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch EODHD prices
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python scripts/update_prices.py --output data/prices.json --enforce-market-window
          else
            python scripts/update_prices.py --output data/prices.json
          fi

      - name: Commit updated prices
        run: |
          if [ ! -f data/prices.json ]; then
            echo "No price file written"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          if git diff --cached --quiet; then
            echo "No price changes to commit"
          else
            git commit -m "Update prices"
            git push
          fi
