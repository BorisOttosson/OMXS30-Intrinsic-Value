name: Update prices

on:
  workflow_dispatch:
  schedule:
    # Every five minutes on weekdays. The Python script filters to 09:01-17:01 Stockholm time.
    - cron: "1-56/5 7-16 * * 1-5"

permissions:
  contents: write

concurrency:
  group: omxs30-data-writes
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch EODHD prices
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python scripts/update_prices.py --output data/prices.json --enforce-market-window
          else
            python scripts/update_prices.py --output data/prices.json
          fi

      - name: Commit updated prices
        run: |
          if [ ! -f data/prices.json ]; then
            echo "No price file written"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.json

          if git diff --cached --quiet; then
            echo "No price changes to commit"
            exit 0
          fi

          git commit -m "Update prices"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push; then
              exit 0
            fi
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done

          echo "Could not push updated prices after 3 attempts"
          exit 1
